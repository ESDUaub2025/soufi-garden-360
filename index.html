<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sioufi Garden 360 — Interactive Map &amp; Tour</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="An interactive map and 360° video tour of Sioufi Garden, Beirut." />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/video-plugin@5.14.3/index.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/map-plugin@5.14.3/index.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app" class="mode-map">

  <!-- Full-screen landing map -->
  <div id="map-view">
    <div id="map-header">
      <span id="map-eyebrow">Beirut &middot; Achrafieh</span>
      <h1 id="map-title">Sioufi Garden</h1>
      <p id="map-sub">Tap a pin to step into that spot in 360&deg;. Muted pins don&rsquo;t have footage yet.</p>
    </div>

    <div id="map-scroll">
      <div id="map-canvas">
        <img id="map-img" src="map/sioufi-garden-map.svg" alt="Sioufi Garden site map" draggable="false" />
        <!-- pin buttons are injected here by app.js, one per entry in scenes.js's mapHotspots -->
      </div>
    </div>

    <div id="map-controls">
      <button id="map-zoom-in" type="button" aria-label="Zoom in">+</button>
      <button id="map-zoom-out" type="button" aria-label="Zoom out">&ndash;</button>
    </div>

    <div id="map-hint">Drag to pan &middot; tap a pin to explore</div>

    <div id="map-tooltip" class="hidden">
      <div id="map-tooltip-thumb-wrap" class="hidden">
        <img id="map-tooltip-thumb" alt="" />
      </div>
      <div id="map-tooltip-name"></div>
      <div id="map-tooltip-desc"></div>
      <div id="map-tooltip-note"></div>
      <button id="map-tooltip-enter" type="button" class="hidden">Explore in 360&deg; &rarr;</button>
    </div>
  </div>

  <!-- Top bar -->
  <header id="top-bar" class="chrome">
    <div id="brand">
      <span class="brand-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 21c-4.4-2.4-7-6.2-7-10.4C5 6 8.1 3 12 3s7 3 7 7.6c0 4.2-2.6 8-7 10.4z" fill="currentColor" />
          <path d="M12 17.5V7.5M12 10.5c1.6-1.6 2.6-2 4-2M12 14c-1.6-1.6-2.6-2-4-2" stroke="#fff" stroke-width="1.1" stroke-linecap="round" />
        </svg>
      </span>
      <div id="brand-text">
        <span id="scene-title">Loading…</span>
        <span id="scene-sub">Sioufi Garden &middot; Beirut</span>
      </div>
    </div>
    <div id="top-bar-progress" aria-live="polite">
      <span class="sr-only">Area <span id="progress-current">–</span> of <span id="progress-total">–</span></span>
      <div id="progress-dots" aria-hidden="true"></div>
    </div>
  </header>

  <!-- Viewer -->
  <div id="viewer-shell">
    <div id="viewer"></div>

    <!-- Custom loading overlay -->
    <div id="loading-overlay">
      <div id="loading-spinner" aria-hidden="true">
        <svg viewBox="0 0 50 50">
          <circle class="spinner-track" cx="25" cy="25" r="20" fill="none" stroke-width="3"></circle>
          <circle class="spinner-arc" cx="25" cy="25" r="20" fill="none" stroke-width="3"></circle>
        </svg>
      </div>
      <p id="loading-text">Loading area…</p>
    </div>

    <!-- Tilt-to-look prompt (mobile gyroscope) -->
    <button id="gyro-prompt" type="button" class="hidden chrome">
      <span class="gyro-icon" aria-hidden="true">⟳</span>
      Tap to enable tilt controls
    </button>

    <!-- Small popup anchored above a marker (first tap); tapping the same marker again opens the full popup card below -->
    <div id="marker-mini-popup" class="hidden">
      <div id="marker-mini-title"></div>
      <div id="marker-mini-hint">Tap again for details</div>
    </div>

    <!-- Marker popup card -->
    <div id="popup-backdrop" class="hidden"></div>
    <div id="popup-card" class="hidden" role="dialog" aria-modal="true" aria-labelledby="popup-title">
      <button id="popup-close" type="button" aria-label="Close">✕</button>
      <div id="popup-image-wrap" class="hidden">
        <img id="popup-image" alt="" />
      </div>
      <h3 id="popup-title"></h3>
      <p id="popup-description"></p>
    </div>
  </div>

  <!-- Bottom controls -->
  <footer id="controls-bar" class="chrome">
    <div class="controls-group">
      <button id="btn-map" type="button" class="control-btn" aria-label="Back to map">
        <svg viewBox="0 0 24 24"><path d="M9 4L3 6.5v14L9 18l6 2.5 6-2.5v-14L15 6.5 9 4zM9 4v14M15 6.5v14" /></svg>
      </button>

      <button id="btn-prev" type="button" class="control-btn" aria-label="Previous area">
        <svg viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8" /></svg>
      </button>

      <button id="btn-playpause" type="button" class="control-btn control-btn--primary" aria-label="Play or pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z" /></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" class="hidden"><path d="M6 4h4v16H6zM14 4h4v16h-4z" /></svg>
      </button>

      <button id="btn-reset" type="button" class="control-btn" aria-label="Reset view">
        <svg viewBox="0 0 24 24"><path d="M12 5V2L7 7l5 5V9a5 5 0 11-5 5H5a7 7 0 107-9z" /></svg>
      </button>

      <button id="btn-next" type="button" class="control-btn" aria-label="Next area">
        <svg viewBox="0 0 24 24"><path d="M9 4l8 8-8 8" /></svg>
      </button>
    </div>
  </footer>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
    "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.module.js",
    "@photo-sphere-viewer/video-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/video-plugin@5.14.3/index.module.js",
    "@photo-sphere-viewer/equirectangular-video-adapter": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/equirectangular-video-adapter@5.14.3/index.module.js",
    "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.module.js",
    "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.14.3/index.module.js",
    "@photo-sphere-viewer/map-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/map-plugin@5.14.3/index.module.js"
  }
}
</script>
<script type="module" src="scenes.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
